<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Krusty Krab | Home of the Krabby Patty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling & Underwater Vibes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', 'Comic Sans MS', sans-serif; 
        }

        body {
            background: linear-gradient(180deg, #1a8cff 0%, #003366 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px; /* Space for the floating cart */
        }

        /* Header / Nautical Decor */
        header {
            background-color: #d2691e;
            border-bottom: 10px solid #8b4513;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        .anchor-deco {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 10px;
            letter-spacing: 10px;
        }

        h1 {
            color: #ffcc00;
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 4px 4px 0px #ff0000, 7px 7px 0px #111;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .slogan {
            font-style: italic;
            color: #fff;
            font-size: 1.4rem;
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        /* Main Layout */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(0, 0, 51, 0.6);
            border: 4px dashed #00ffff;
            border-radius: 15px;
        }

        /* Order Alert Banner */
        .banner {
            background-color: #ff3333;
            color: yellow;
            padding: 12px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 5px;
            margin-bottom: 25px;
            border: 2px solid white;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
