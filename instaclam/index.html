<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instaclam Live Stream</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Comic Sans MS', 'Helvetica Neue', sans-serif;
            background: #050f1d;
            color: #e2f1ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Stream Header */
        header {
            width: 100%; max-width: 500px; background: #0b2240; 
            border-bottom: 3px solid #00d2ff; padding: 12px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 {
            font-size: 1.6rem; color: #ff6b6b;
            text-shadow: 1px 1px 0px #fffb00, 2px 2px 0px #000;
            font-style: italic;
        }

        /* Main App Wrapper stacked vertically like a phone app */
        .stream-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: calc(100vh - 60px);
            background: #07162c;
        }

        /* The Simulated Live Video Feed */
        .video-stage {
            width: 100%;
            height: 35%;
            background: radial-gradient(circle, #0e3059 0%, #030d1a 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 3px solid #113057;
            overflow: hidden;
        }

        .video-stage iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Hidden by default until stream is live */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        .video-stage .live-badge {
            position: absolute; top: 10px; left: 10px;
            background: #ff4757; color: white; padding: 3px 8px;
            border-radius: 6px; font-weight: bold; font-size: 0.75rem;
            letter-spacing: 1px; animation: blink 1.5s infinite;
            z-index: 10;
        }

        .video-stage .viewers {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.6); padding: 3px 8px;
            border-radius: 6px; font-size: 0.75rem; color: #00d2ff;
            z-index: 10;
        }

        .stream-graphic { font-size: 4rem; animation: float 4s ease-in-out infinite; user-select: none; }

        /* The Live Chat Box Feed */
        .chat-feed-window {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #051224;
        }

        /* Chat Message Bubbles */
        .chat-msg {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: slideIn 0.2s ease-out;
            background: rgba(11, 34, 64, 0.4);
            padding: 8px 12px;
            border-radius: 8px;
            position: relative;
        }

        .chat-avatar {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.9rem; flex-shrink: 0;
        }

        .chat-details { font-size: 0.9rem; line-height: 1.3; width: 100%; word-break: break-word; }
        .chat-name { font-weight: bold; color: #00d2ff; margin-right: 5px; }
        .chat-text { color: #ccdff0; }

        /* Small embedded scrap button for live chat deletion */
        .chat-scrap-btn {
            background: none; border: none; color: #ff6b6b;
            font-size: 0.8rem; cursor: pointer; font-weight: bold;
            margin-left: 8px; float: right; opacity: 0.6;
        }
        .chat-scrap-btn:hover { opacity: 1; text-decoration: underline; }

        /* Input Deck Bar locked to the bottom */
        .input-deck {
            background: #0b2240;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #113057;
            align-items: center;
        }

        .input-deck input {
            flex-grow: 1;
            padding: 10px 14px;
            border-radius: 20px;
            background: #121212;
            color: white;
            border: 2px solid #00d2ff;
            font-family: inherit;
            outline: none;
            font-size: 0.95rem;
        }

        .input-deck button {
            background: #00d2ff; color: #07162c;
            border: none; padding: 10px 18px; border-radius: 20px;
            font-weight: bold; cursor: pointer; font-family: inherit;
        }

        /* Identity Banner Top Ribbon */
        .identity-ribbon {
            background: #113057; padding: 6px 12px; font-size: 0.8rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1c4b82;
        }

        /* Setup Account Portal overlay */
        .portal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 15, 29, 0.98); display: flex; 
            justify-content: center; align-items: center; z-index: 1000;
        }
        .portal-box {
            background: #0b2240; padding: 30px; border-radius: 20px;
            border: 4px solid #fffb00; text-align: center; max-width: 380px; width: 90%;
        }
        .portal-box h2 { color: #ff6b6b; margin-bottom: 15px; }
        .portal-box input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 2px solid #00d2ff; background: #121212; color: white; text-align: center; font-family: inherit; }
        .portal-box button { background: #ffb703; color: #07162c; border: none; padding: 10px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; font-family: inherit; }

        /* Animations */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
        @keyframes slideIn { from { transform: translateY(5px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="accountPortal" class="portal-overlay" style="display: none;">
        <div class="portal-box">
            <h2>Stream Chat Sign-In 🐚</h2>
            <p>Pick a handle to join the live broadcast room.</p>
            <input text="text" id="usernameInput" placeholder="Username" maxlength="20">
            <button onclick="registerAccount()">Enter Chat</button>
        </div>
    </div>

    <header>
        <h1>Instaclam LIVE 📺</h1>
        <div style="color: #00d2ff; font-size: 0.85rem; cursor: pointer;" onclick="fetchLiveChat()">🔄 Force Sync</div>
    </header>

    <div class="stream-container">
        
        <div class="video-stage">
            <div class="live-badge">● LIVE</div>
            <div class="viewers" id="liveViewerCount">👁️ Syncing...</div>
            
            <iframe id="aparatPlayer" src="https://www.aparat.com/video/video/embed/videohash/l1ve/vt/frame" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
            
            <div class="stream-graphic" id="offlineGraphic">🐙</div>
        </div>

        <div class="identity-ribbon">
            <div>Chatting as: <span id="myUsername" style="color:#00d2ff; font-weight:bold;">...</span></div>
            <div style="color:#ff6b6b; cursor:pointer; text-decoration:underline;" onclick="logout()">Change Identity</div>
        </div>

        <div class="chat-feed-window" id="chatFeedBox">
            <p style="text-align:center; color:#55729
