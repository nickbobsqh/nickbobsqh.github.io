<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instaclam Live Stream Chat</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Comic Sans MS', 'Helvetica Neue', sans-serif;
            background: #050f1d;
            color: #e2f1ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* Dynamic patch to force-fit mobile screen sizes safely */
            overflow: hidden;
        }

        /* Stream Header */
        header {
            width: 100%; max-width: 500px; background: #0b2240; 
            border-bottom: 3px solid #00d2ff; padding: 12px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            flex-shrink: 0; /* Keeps the header from squishing on tiny phones */
        }

        header h1 {
            font-size: 1.6rem; color: #ff6b6b;
            text-shadow: 1px 1px 0px #fffb00, 2px 2px 0px #000;
            font-style: italic;
        }

        /* Main App Wrapper stacked vertically like a phone app */
        .stream-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            height: calc(100dvh - 60px); /* Synchronized with dynamic screen height */
            background: #07162c;
            overflow: hidden;
        }

        /* Information Ribbon */
        .identity-ribbon {
            background: #113057; padding: 6px 12px; font-size: 0.8rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1c4b82;
            flex-shrink: 0;
        }

        /* The Live Chat Box Feed */
        .chat-feed-window {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #051224;
            -webkit-overflow-scrolling: touch; /* Smoother scrolling engine on iPhones */
        }

        /* Chat Message Bubbles */
        .chat-msg {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: slideIn 0.2s ease-out;
            background: rgba(11, 34, 64, 0.4);
            padding: 8px 12px;
            border-radius: 8px;
            position: relative;
        }

        .chat-avatar {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.9rem; flex-shrink: 0;
        }

        .chat-details { font-size: 0.9rem; line-height: 1.3; width: 100%; word-break: break-word; }
        .chat-name { font-weight: bold; color: #00d2ff; margin-right: 5px; }
        .chat-text { color: #ccdff0; }

        /* Deletion system controls */
        .chat-scrap-btn {
            background: none; border: none; color: #ff6b6b;
            font-size: 0.8rem; cursor: pointer; font-weight: bold;
            margin-left: 8px; float: right; opacity: 0.6;
        }
        .chat-scrap-btn:hover { opacity: 1; text-decoration: underline; }

        /* Input Controls Deck anchored right at the thumb line */
        .input-deck {
            background: #0b2240;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #113057;
            align-items: center;
            flex-shrink: 0;
        }

        .input-deck input {
            flex-grow: 1;
            padding: 10px 14px;
            border-radius: 20px;
            background: #121212;
            color: white;
            border: 2px solid #00d2ff;
            font-family: inherit;
            outline: none;
            font-size: 16px; /* 16px font baseline stops iOS Safari from zooming automatically when typing */
        }

        .input-deck button {
            background: #00d2ff; color: #07162c;
            border: none; padding: 10px 18px; border-radius: 20px;
            font-weight: bold; cursor: pointer; font-family: inherit;
        }

        /* Overlay Shield */
        .portal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 15, 29, 0.98); display: flex; 
            justify-content: center; align-items: center; z-index: 1000;
        }
        .portal-box {
            background: #0b2240; padding: 30px; border-radius: 20px;
            border: 4px solid #fffb00; text-align: center; max-width: 380px; width: 90%;
        }
        .portal-box h2 { color: #ff6b6b; margin-bottom: 15px; }
        .portal-box input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 2px solid #00d2ff; background: #121212; color: white; text-align: center; font-family: inherit; font-size: 16px; }
        .portal-box button { background: #ffb703; color: #07162c; border: none; padding: 10px 24px; border-radius: 20px; font-weight: bold; cursor: pointer; font-family: inherit; }

        @keyframes slideIn { from { transform: translateY(5px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="accountPortal" class="portal-overlay" style="display: none;">
        <div class="portal-box">
            <h2>Stream Chat Sign-In 🐚</h2>
            <p>Pick a handle to join the live broadcast room.</p>
            <input type="text" id="usernameInput" placeholder="Username" maxlength="20">
            <button onclick="registerAccount()">Enter Chat</button>
        </div>
    </div>

    <header>
        <h1>Instaclam Chat 📺</h1>
        <div style="color: #00d2ff; font-size: 0.85rem; cursor: pointer;" onclick="fetchLiveChat()">🔄 Force Sync</div>
    </header>

    <div class="stream-container">
        
        <div class="identity-ribbon">
            <div>Chatting as: <span id="myUsername" style="color:#00d2ff; font-weight:bold;">...</span></div>
            <div style="color:#ff6b6b; cursor:pointer; text-decoration:underline;" onclick="logout()">Change Identity</div>
        </div>

        <div class="chat-feed-window" id="chatFeedBox">
            <p style="text-align:center; color:#557299; font-size:0.85rem; padding-top:20px;">Connecting to reef frequencies...</p>
        </div>

        <div class="input-deck">
            <input type="text" id="chatMessageInput" placeholder="Send a live message..." maxlength="120" onkeydown="if(event.key === 'Enter') sendChatMessage()">
            <button onclick="sendChatMessage()">Chat</button>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://gdmbucbxgzjirtghczfa.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkbWJ1Y2J4Z3pqaXJ0Z2hjemZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzYyMzQsImV4cCI6MjA5Njk1MjIzNH0.dWbxCwnjBk1hr2GNvk0n8nj8fFnpfboe7NALTxZ2fVQ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const fishEmojis = ["🧽", "⭐", "🐙", "🦀", "🐿️", "🐳", "🐡", "🐠", "🦐", "🐚"];
        const bioColors = ["#fffbcc", "#ffccd5", "#bbf2f6", "#ffcccc", "#e2c4a4", "#c0d6e4", "#d1f2d9", "#fae1af"];

        let currentAccount = null;

        function checkIdentity() {
            const savedUser = localStorage.getItem('instaclam_user');
            if (!savedUser) {
                document.getElementById('accountPortal').style.display = 'flex';
            } else {
                currentAccount = JSON.parse(savedUser);
                document.getElementById('accountPortal').style.display = 'none';
                document.getElementById('myUsername').innerText = currentAccount.username + (currentAccount.isAdmin ? " [ADMIN]" : "");
                fetchLiveChat();
            }
        }

        function registerAccount() {
            const rawInput = document.getElementById('usernameInput').value.trim();
            if(rawInput === "" || rawInput.length < 3) {
                alert("Handle must be at least 3 letters long!");
                return;
            }
            
            const cleanName = rawInput.replace(/[^a-zA-Z0-9_]/g, "");

            let isAdminAccount = false;
            if (cleanName === "NickBobSqH") {
                const pass = prompt("Enter Admin Passphrase:");
                if (pass === "2954@") {
                    alert("Admin clearance granted. 👑");
                    isAdminAccount = true;
                } else {
                    alert("Wrong authorization key.");
                    return;
                }
            }

            const randomEmoji = isAdminAccount ? "👑" : fishEmojis[Math.floor(Math.random() * fishEmojis.length)];
            const randomColor = isAdminAccount ? "#ffe3e8" : bioColors[Math.floor(Math.random() * bioColors.length)];

            currentAccount = {
                username: cleanName,
                emoji: randomEmoji,
                color: randomColor,
                isAdmin: isAdminAccount
            };

            localStorage.setItem('instaclam_user', JSON.stringify(currentAccount));
            
            document.getElementById('accountPortal').style.display = 'none';
            document.getElementById('myUsername').innerText = currentAccount.username + (currentAccount.isAdmin ? " [ADMIN]" : "");
            fetchLiveChat();
        }

        function logout() {
            if(confirm("Log out of this handle?")) {
                localStorage.removeItem('instaclam_user');
                checkIdentity();
            }
        }

        async function fetchLiveChat() {
            const chatBox = document.getElementById('chatFeedBox');
            
            let { data: entries, error } = await _supabase
                .from('instaclam_posts')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(40);

            if (error) {
                chatBox.innerHTML = `<p style="color:#ff6b6b; text-align:center;">Feed error: ${error.message}</p>`;
                return;
            }

            chatBox.innerHTML = ""; 

            if(entries.length === 0) {
                chatBox.innerHTML = `<p style="text-align:center; padding:20px; color:#557299;">Chat is quiet. Say something below!</p>`;
                return;
            }

            entries.forEach(entry => {
                const avatarEmoji = entry.user_emoji || "🫧";
                const avatarBg = entry.user_color || "#113057";

                let inlineDeleteHTML = "";
                if (currentAccount) {
                    if (currentAccount.isAdmin || entry.username === currentAccount.username) {
                        inlineDeleteHTML = `<button class="chat-scrap-btn" onclick="deleteChatMessage(${entry.id})">[scrap]</button>`;
                    }
                }

                const msgRow = document.createElement('div');
                msgRow.className = 'chat-msg';
                msgRow.innerHTML = `
                    <div class="chat-avatar" style="background: ${avatarBg};">${avatarEmoji}</div>
                    <div class="chat-details">
                        <span class="chat-name">${entry.username}:</span>
                        <span class="chat-text">${escapeHTML(entry.caption)}</span>
                        ${inlineDeleteHTML}
                    </div>
                `;
                chatBox.appendChild(msgRow);
            });

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendChatMessage() {
            if(!currentAccount) return;

            const input = document.getElementById('chatMessageInput');
            const messageText = input.value.trim();

            if (messageText === "") return;

            input.value = ""; 

            const { error } = await _supabase
                .from('instaclam_posts')
                .insert([{ 
                    username: currentAccount.username, 
                    caption: messageText,
                    user_emoji: currentAccount.emoji,
                    user_color: currentAccount.color
                }]);

            if (error) {
                alert("Message failed: " + error.message);
            } else {
                fetchLiveChat(); 
            }
        }

        async function deleteChatMessage(id) {
            if (!confirm("Remove this comment from the broadcast logs?")) return;

            const { error } = await _supabase
                .from('instaclam_posts')
                .delete()
                .eq('id', id);

            if (error) {
                alert("Failed deletion: " + error.message);
            } else {
                fetchLiveChat(); 
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        checkIdentity();
        setInterval(fetchLiveChat, 3000);
    </script>
</body>
</html>
